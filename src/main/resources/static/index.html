<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebSnakGame</title>
    <style>
        body {
            margin: 0;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #f9fbff, #e9f1ff);
            color: #1a2d4d;
        }

        #stage {
            border: 2px solid #7ba8ff;
            border-radius: 12px;
            background: #f8fbff;
            box-shadow: 0 14px 35px rgba(67, 117, 199, 0.25);
        }

        #status {
            margin-top: 16px;
            text-align: center;
            width: 100%;
        }

        #tips {
            font-size: 0.9rem;
            color: #5372a6;
            margin-top: 4px;
        }

        #restart {
            display: none;
            margin-top: 8px;
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            background: #5f86e8;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(95, 134, 232, 0.35);
        }

        #restart:hover {
            background: #4f77dd;
        }
    </style>
</head>
<body>
    <div>
        <canvas id="stage" width="400" height="400"></canvas>
        <div id="status">
            <p id="connection">連線：尚未建立</p>
            <p id="current-direction">方向：等待輸入</p>
            <p id="score">分數：0</p>
            <p id="tips">使用方向鍵或 WASD 控制貪食蛇，輸入會透過 WebSocket 傳送至後端。</p>
            <button id="restart">重新開始</button>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
    const roomId = 'arena';
    const playerId = 'player-' + Math.floor(Math.random() * 1000);
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const connectionEl = document.getElementById('connection');
    const directionEl = document.getElementById('current-direction');
    const scoreEl = document.getElementById('score');
    const restartBtn = document.getElementById('restart');
    const cellSize = 20;

    let stompClient;
    let currentDirection = 'NONE';
    let lastSentDirection = null;
    let lastGameState = null;
    let shouldAutoRestart = true;

    const stateRenderer = (gameState) => {
        if (!gameState || !Array.isArray(gameState.body)) {
            return;
        }
        lastGameState = gameState;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f3f7ff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(106,137,191,0.22)';
        for (let x = 0; x <= canvas.width; x += cellSize) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += cellSize) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }
        const body = gameState.body;
        body.forEach((segment, index) => {
            ctx.fillStyle = index === body.length - 1 ? '#ffb347' : '#4bbd8b';
            ctx.fillRect(segment.x * cellSize, segment.y * cellSize, cellSize - 2, cellSize - 2);
        });
        if (gameState.food) {
            ctx.fillStyle = '#ff5c73';
            ctx.beginPath();
            ctx.arc(gameState.food.x * cellSize + cellSize / 2, gameState.food.y * cellSize + cellSize / 2, cellSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }
        document.getElementById('score').textContent = `分數：${gameState.score}`;
    };

    const hideRestart = () => restartBtn && (restartBtn.style.display = 'none');
    const showRestart = () => restartBtn && (restartBtn.style.display = 'inline-block');

    const handleIncomingPayload = (payload) => {
        if (payload.body) {
            lastGameState = payload;
            stateRenderer(payload);
            const statusText = payload.status === 'ENDED' ? '已死亡' : (payload.status === 'RUNNING' ? '進行中' : '等待');
            directionEl.textContent = `方向：${statusText}`;
            connectionEl.textContent = payload.status === 'ENDED' ? '連線：遊戲已結束' : '連線：進行中';
            if (payload.status === 'ENDED') {
                showRestart();
            } else {
                hideRestart();
            }
            return;
        }
        if (payload.event === 'growth_event') {
            directionEl.textContent = `方向：成長（分數 ${payload.newScore || ''})`;
            return;
        }
        if (payload.event === 'death_event') {
            connectionEl.textContent = '連線：遊戲已結束';
            directionEl.textContent = payload.reason ? `方向：${payload.reason}` : '方向：死亡';
            showRestart();
        }
    };

    const connect = () => {
        const socket = new SockJS('/game');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, () => {
            connectionEl.textContent = '連線：已連至 /game';
            hideRestart();
            stompClient.subscribe(`/topic/game/${roomId}`, ({body}) => {
                const payload = JSON.parse(body);
                handleIncomingPayload(payload);
            });
            if (shouldAutoRestart) {
                shouldAutoRestart = false;
                sendRestart();
            }
        }, () => {
            connectionEl.textContent = '連線：中斷，等待重連...';
            setTimeout(connect, 1000);
        });
    };

    const sendMove = (direction) => {
        if (!stompClient || !stompClient.connected) {
            return;
        }
        const payload = {
            roomId,
            playerId,
            direction,
            action: 'move'
        };
        stompClient.send('/app/action', {}, JSON.stringify(payload));
        lastSentDirection = direction;
    };

    const sendRestart = () => {
        if (!stompClient || !stompClient.connected) {
            return;
        }
        const payload = {
            roomId,
            playerId,
            direction: 'UP',
            action: 'restart'
        };
        stompClient.send('/app/action', {}, JSON.stringify(payload));
        currentDirection = 'NONE';
        hideRestart();
        connectionEl.textContent = '連線：已送出重新開始';
        directionEl.textContent = '方向：等待輸入';
    };

    const opposite = {
        ArrowUp: 'ArrowDown',
        ArrowDown: 'ArrowUp',
        ArrowLeft: 'ArrowRight',
        ArrowRight: 'ArrowLeft',
        w: 's',
        s: 'w',
        a: 'd',
        d: 'a'
    };

    const keyMap = {
        ArrowUp: 'UP',
        ArrowDown: 'DOWN',
        ArrowLeft: 'LEFT',
        ArrowRight: 'RIGHT',
        w: 'UP',
        s: 'DOWN',
        a: 'LEFT',
        d: 'RIGHT'
    };

        window.addEventListener('keydown', (event) => {
            const key = event.key;
            const normalizedKey = key.length === 1 ? key.toLowerCase() : key;
            if (!keyMap[normalizedKey]) {
                return;
            }
            event.preventDefault();
            event.stopPropagation();
            const direction = keyMap[normalizedKey];
            if (direction === 'UP' && currentDirection === 'DOWN') {
                return;
            }
            if (direction === 'DOWN' && currentDirection === 'UP') {
                return;
            }
            if (direction === 'LEFT' && currentDirection === 'RIGHT') {
                return;
            }
            if (direction === 'RIGHT' && currentDirection === 'LEFT') {
                return;
            }
            if (direction === currentDirection) {
                return;
            }
            currentDirection = direction;
            directionEl.textContent = `方向：${direction}`;
            sendMove(direction);
        });

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && (!stompClient || !stompClient.connected)) {
            connect();
        }
    });

    restartBtn.addEventListener('click', () => sendRestart());
    connect();
</script>
</body>
</html>
